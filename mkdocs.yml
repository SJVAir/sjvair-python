site_name: SJVAir
site_description: Command-line tool and Python client for the SJVAir air quality API.
site_url: https://SJVAir.github.io/sjvair-python/
repo_url: https://github.com/SJVAir/sjvair-python
repo_name: SJVAir/sjvair-python

# Docs dev server on :8080 to avoid colliding with the app's :8000 dev server.
dev_addr: localhost:8080

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            heading_level: 2
            members_order: source
            separate_signature: true

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
  - mkdocs_click

exclude_docs: |
  superpowers/

nav:
  - Home: index.md
  - CLI:
      - Guide: cli/guide.md
      - Reference: cli/reference.md
  - Python client:
      - Guide: client/guide.md
      - API reference: client/reference.md
  - Changelog: changelog.md
