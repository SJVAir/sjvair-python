name: Publish
on:
  push:
    tags: ['v*']
permissions:
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync --dev
      - run: uv run pytest -m "not live"
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
