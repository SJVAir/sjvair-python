name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run ruff check sjvair
      - run: uv run ruff format --check sjvair
      - run: uv run ty check sjvair
      - run: uv run pytest -m "not live"
